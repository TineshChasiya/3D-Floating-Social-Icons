<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Floating Social Icons</title>
    <link rel="stylesheet" href="style.css">
    <!-- Font Awesome Icons  -->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

</head>

<body>
    <!-- 3D Stage Container -->
     <div class="social-container">
        <!-- Instagram Icon -->
         <a href="#" class="social-card instagram">
            <div class="layer shadow-layer"></div>
            <div class="layer layer-1"></div>
            <div class="layer layer-2"></div>
            <div class="layer icon-layer">
                <i class="fa-brands fa-instagram"></i>
            </div>
        </a>
        <!-- X (Twitter) Icon -->
         <a href="#" class="social-card twitter">
            <div class="layer shadow-layer"></div>
            <div class="layer layer-1"></div>
            <div class="layer layer-2"></div>
            <div class="layer icon-layer">
                <i class="fa-brands fa-x"></i>
            </div>
        </a>
        <!-- Discord Icon -->
         <a href="#" class="social-card discord">
            <div class="layer shadow-layer"></div>
            <div class="layer layer-1"></div>
            <div class="layer layer-2"></div>
            <div class="layer icon-layer">
                <i class="fa-brands fa-discord"></i>
            </div>
        </a>
        <!-- Github Icon -->
         <a href="#" class="social-card github">
            <div class="layer shadow-layer"></div>
            <div class="layer layer-1"></div>
            <div class="layer layer-2"></div>
            <div class="layer icon-layer">
                <i class="fa-brands fa-github"></i>
            </div>
        </a>
     </div>
</body>

</html>
